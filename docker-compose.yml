services:
  db:
    image: postgres:16-alpine
    container_name: pintora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pintora}
      POSTGRES_USER: ${POSTGRES_USER:-pintora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pintora}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pintora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pintora} -d ${POSTGRES_DB:-pintora}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pintora_postgres_data:
