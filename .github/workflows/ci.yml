name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx prettier --check .
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (tests, schema drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pintora
          POSTGRES_USER: pintora
          POSTGRES_PASSWORD: pintora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pintora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py test
      - name: Check committed OpenAPI schema is current
        run: |
          python manage.py spectacular --file schema.yml
          git diff --exit-code schema.yml
