name: pintora
region: nyc

services:
  - name: api
    source_dir: backend
    github:
      repo: melcantwell27/pintora
      branch: main
      deploy_on_push: true
    environment_slug: python
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8000
    build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput
    run_command: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --log-file -
    health_check:
      http_path: /api/health/
      initial_delay_seconds: 10
      period_seconds: 30
      failure_threshold: 3
    envs:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DJANGO_ALLOWED_HOSTS
        value: "${api.HOSTNAME}"
        scope: RUN_AND_BUILD_TIME
      - key: CORS_ALLOWED_ORIGINS
        value: "https://${web.HOSTNAME}"
        scope: RUN_AND_BUILD_TIME
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://${api.HOSTNAME},https://${web.HOSTNAME}"
        scope: RUN_AND_BUILD_TIME
      - key: FRONTEND_ORIGIN
        value: "https://${web.HOSTNAME}"
        scope: RUN_AND_BUILD_TIME
      - key: POSTGRES_DB
        value: "${db.DATABASE}"
        scope: RUN_AND_BUILD_TIME
      - key: POSTGRES_USER
        value: "${db.USERNAME}"
        scope: RUN_AND_BUILD_TIME
      - key: POSTGRES_PASSWORD
        value: "${db.PASSWORD}"
        scope: RUN_AND_BUILD_TIME
      - key: POSTGRES_HOST
        value: "${db.HOSTNAME}"
        scope: RUN_AND_BUILD_TIME
      - key: POSTGRES_PORT
        value: "${db.PORT}"
        scope: RUN_AND_BUILD_TIME
      - key: GOOGLE_OAUTH_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET

  - name: web
    source_dir: frontend
    github:
      repo: melcantwell27/pintora
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3000
    build_command: npm ci && npm run build
    run_command: npm start
    health_check:
      http_path: /
      initial_delay_seconds: 10
      period_seconds: 30
      failure_threshold: 3
    envs:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://${api.HOSTNAME}"
        scope: BUILD_TIME

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
    cluster_name: pintora-db
